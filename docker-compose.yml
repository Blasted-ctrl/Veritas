# Veritas full-stack compose.
#
# Phase 1 ships Redis + the backend image (used for data prep & the inference
# API). The `api`, `worker` and `frontend` service code is filled in across
# Phases 4-5; the service definitions are here so the architecture is visible
# and `docker compose up` grows into the full stack without restructuring.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: uvicorn veritas.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CELERY_TASK_ALWAYS_EAGER=0
    command: celery -A veritas.tasks.app worker --loglevel=info
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["full"]

volumes:
  redis-data:
