name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, type-check & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend (dev extras)
        run: |
          python -m pip install --upgrade pip
          # Core package is stdlib-only; dev extras give us ruff/mypy/pytest.
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest, stdlib core)
        run: pytest --cov=veritas --cov-report=term-missing

  ml-tests:
    name: ML pipeline smoke (torch CPU)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU torch + ML deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the job small and avoids CUDA wheels.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install "transformers>=4.40" "scikit-learn>=1.3" "numpy>=1.26" "pillow>=10" pytest
      - name: ML smoke tests (tiny ViT, no network)
        env:
          HF_HUB_OFFLINE: "1"          # the smoke tests build a random-init ViT
          TRANSFORMERS_OFFLINE: "1"
        run: pytest -m ml -p no:cacheprovider

  frontend:
    name: Frontend lint, type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    # Enabled from Phase 5 once the Next.js app exists.
    if: ${{ hashFiles('frontend/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
